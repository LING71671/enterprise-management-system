<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小麦科技</title>
    <link rel="icon" href="src/assets/images/logo.ico" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #07111f;
            --bg2: #0b1d33;
            --gold: #d7b56d;
            --gold-soft: rgba(215, 181, 109, 0.35);
            --white: rgba(255, 255, 255, 0.95);
            --muted: rgba(255, 255, 255, 0.68);
            --line: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(45, 114, 255, 0.18), transparent 30%),
                radial-gradient(circle at 80% 25%, rgba(215, 181, 109, 0.15), transparent 28%),
                radial-gradient(circle at 50% 80%, rgba(0, 204, 255, 0.08), transparent 30%),
                linear-gradient(135deg, var(--bg), var(--bg2));
            color: var(--white);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(circle at center, black 45%, transparent 95%);
            -webkit-mask-image: radial-gradient(circle at center, black 45%, transparent 95%);
            animation: gridMove 10s linear infinite;
            opacity: 0.5;
        }

        @keyframes gridMove {
            0% {
                transform: translateY(0) scale(1);
            }
            100% {
                transform: translateY(48px) scale(1.02);
            }
        }

        .particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(255,255,255,0.05));
            box-shadow: 0 0 18px rgba(255,255,255,0.3);
            animation: floatUp linear infinite;
            opacity: 0.65;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(20px) scale(0.8);
                opacity: 0;
            }
            20% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-120vh) scale(1.2);
                opacity: 0;
            }
        }

        .center-wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .launch-card {
            width: min(92vw, 760px);
            padding: 46px 42px 34px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow:
                0 20px 80px rgba(0, 0, 0, 0.42),
                inset 0 1px 0 rgba(255,255,255,0.10),
                0 0 0 1px rgba(255,255,255,0.02);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: cardEnter 1.1s cubic-bezier(.22,.9,.25,1) both;
        }

        .launch-card::before {
            content: "";
            position: absolute;
            inset: -2px;
            background: linear-gradient(120deg, transparent 15%, rgba(255,255,255,0.12) 50%, transparent 85%);
            transform: translateX(-120%);
            animation: shine 2.2s ease-in-out infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-120%);
            }
            55% {
                transform: translateX(120%);
            }
            100% {
                transform: translateX(120%);
            }
        }

        @keyframes cardEnter {
            0% {
                opacity: 0;
                transform: translateY(36px) scale(0.96);
                filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .logo-ring {
            width: 108px;
            height: 108px;
            margin: 0 auto 22px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            position: relative;
            background: radial-gradient(circle at center, rgba(255,255,255,0.14), rgba(255,255,255,0.03));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow:
                0 0 0 10px rgba(255,255,255,0.02),
                0 0 40px rgba(215, 181, 109, 0.12);
            animation: pulse 2.2s ease-in-out infinite;
        }

        .logo-ring::before,
        .logo-ring::after {
            content: "";
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 1px solid rgba(215, 181, 109, 0.20);
            animation: ripple 2.4s linear infinite;
        }

        .logo-ring::after {
            animation-delay: 1.2s;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
        }

        @keyframes ripple {
            0% {
                transform: scale(0.92);
                opacity: 0.55;
            }
            100% {
                transform: scale(1.18);
                opacity: 0;
            }
        }

        .logo-ring img {
            width: 54px;
            height: 54px;
            object-fit: contain;
            filter: drop-shadow(0 0 18px rgba(255,255,255,0.22));
        }

        .brand {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 10px;
            color: var(--white);
            animation: fadeUp 0.9s ease 0.25s both;
        }

        .subtitle {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
            animation: fadeUp 0.9s ease 0.4s both;
        }

        .desc {
            font-size: 15px;
            line-height: 1.8;
            color: var(--muted);
            margin-bottom: 28px;
            animation: fadeUp 0.9s ease 0.55s both;
        }

        .typing-text {
            min-height: 30px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid rgba(215, 181, 109, 0.9);
            width: fit-content;
            max-width: 100%;
            margin: 0 auto 28px;
            padding-right: 6px;
            animation: cursorBlink 0.8s steps(1) infinite;
        }

        @keyframes cursorBlink {
            0%, 50% {
                border-right-color: rgba(215, 181, 109, 0.95);
            }
            51%, 100% {
                border-right-color: transparent;
            }
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(16px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-wrap {
            width: min(420px, 100%);
            margin: 0 auto;
            animation: fadeUp 0.9s ease 0.7s both;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-fill {
            width: 0;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, rgba(255,255,255,0.75), var(--gold), rgba(255,255,255,0.92));
            box-shadow: 0 0 18px var(--gold-soft);
            animation: loading 2.3s cubic-bezier(.22,.61,.36,1) forwards;
        }

        @keyframes loading {
            0% {
                width: 0;
            }
            100% {
                width: 100%;
            }
        }

        .corner-light {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            pointer-events: none;
        }

        .corner-light.left {
            top: -60px;
            left: -80px;
            background: rgba(62, 133, 255, 0.45);
        }

        .corner-light.right {
            right: -100px;
            bottom: -100px;
            background: rgba(215, 181, 109, 0.35);
        }

        .footer-tip {
            margin-top: 18px;
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.42);
            animation: fadeUp 0.9s ease 0.85s both;
        }

        .fade-out {
            animation: pageOut 0.7s ease forwards;
        }

        @keyframes pageOut {
            0% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
            100% {
                opacity: 0;
                transform: scale(1.03);
                filter: blur(12px);
            }
        }

        @media (max-width: 768px) {
            .launch-card {
                padding: 36px 24px 28px;
                border-radius: 22px;
            }

            .brand {
                font-size: 28px;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 12px;
                letter-spacing: 2px;
            }

            .desc {
                font-size: 14px;
                line-height: 1.7;
            }

            .typing-text {
                white-space: normal;
                text-align: center;
                min-height: 48px;
                border-right-width: 2px;
            }

            .logo-ring {
                width: 92px;
                height: 92px;
            }

            .logo-ring img {
                width: 46px;
                height: 46px;
            }
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="particles" id="particles"></div>

    <div class="corner-light left"></div>
    <div class="corner-light right"></div>

    <div class="center-wrap" id="launchPage">
        <div class="launch-card">
            <div class="logo-ring">
                <img src="src/assets/images/logo.png" alt="小麦科技Logo" />
            </div>

            <div class="subtitle">XIAOMAI TECHNOLOGY</div>
            <h1 class="brand">小麦科技</h1>
            <p class="desc typing-text" id="typingText"></p>

            <div class="progress-wrap">
                <div class="progress-text">
                    <span>系统初始化中</span>
                    <span id="percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <div class="footer-tip">ENTERPRISE INTELLIGENCE PLATFORM</div>
        </div>
    </div>

    <script>
        // 粒子生成
        const particlesContainer = document.getElementById('particles');
        const particleCount = 18;

        for (let i = 0; i < particleCount; i++) {
            const dot = document.createElement('span');
            dot.className = 'particle';
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.bottom = -20 - Math.random() * 100 + 'px';
            dot.style.animationDuration = 5 + Math.random() * 6 + 's';
            dot.style.animationDelay = Math.random() * 4 + 's';
            dot.style.opacity = 0.25 + Math.random() * 0.5;
            dot.style.transform = `scale(${0.6 + Math.random() * 1.2})`;
            particlesContainer.appendChild(dot);
        }

        // 进度数字动画
        const percentEl = document.getElementById('percent');
        let current = 0;
        const totalDuration = 2300;
        const interval = 22;
        const step = 100 / (totalDuration / interval);

        const timer = setInterval(() => {
            current += step;
            if (current >= 100) {
                current = 100;
                clearInterval(timer);
            }
            percentEl.textContent = Math.floor(current) + '%';
        }, interval);

        // slogan 打字机效果
        const typingTextEl = document.getElementById('typingText');
        const slogan = '以智能驱动效率，以科技重塑企业运营';
        let charIndex = 0;

        function typeSlogan() {
            if (charIndex < slogan.length) {
                typingTextEl.textContent += slogan.charAt(charIndex);
                charIndex++;
                setTimeout(typeSlogan, 90);
            }
        }

        setTimeout(typeSlogan, 700);

        // 跳转逻辑
        function getTargetUrl() {
            const url = new URL(window.location.href);
            const campaign = url.searchParams.get('campaign');

            if (campaign === 'douyin') {
                return 'src/pages/landing.html';
            } else if (navigator.userAgent.includes('Mobile')) {
                return 'src/pages/landing.html';
            } else {
                return 'src/pages/landing.html';
            }
        }

        setTimeout(() => {
            document.getElementById('launchPage').classList.add('fade-out');
        }, 2600);

        setTimeout(() => {
            window.location.href = getTargetUrl();
        }, 3200);
    </script>
</body>
</html>
