<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小麦科技</title>
  <link rel="stylesheet" href="src/assets/css/pages/loader.css">
  <!-- JS 禁用时的降级方案 -->
  <meta http-equiv="refresh" content="3.5;url=src/pages/landing.html">
</head>
<body>
  <div class="loader-wrapper" id="loaderWrapper">
    <!-- 背景层 -->
    <div class="bg-layer"></div>
    <div class="light-sweep"></div>
    <div class="grid-bg"></div>

    <!-- 波纹 -->
    <div class="ripple-container">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
    </div>

    <!-- 中心光球 -->
    <div class="center-orb"></div>

    <!-- 粒子系统 -->
    <div class="particles">
      <!-- 飞散粒子 -->
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div>
      <!-- 悬浮粒子 -->
      <div class="float-particle"></div><div class="float-particle"></div>
      <div class="float-particle"></div><div class="float-particle"></div>
      <div class="float-particle"></div><div class="float-particle"></div>
      <div class="float-particle"></div><div class="float-particle"></div>
      <div class="float-particle"></div><div class="float-particle"></div>
    </div>

    <!-- 主内容 -->
    <div class="loader-content">
      <div class="loader-brand">小麦科技</div>
      <div class="loader-tagline">年轻人的智能科技平台</div>
      <div class="loader-divider"></div>
      <div class="loader-motto">北京有小米 · 南京有小麦</div>
    </div>

    <!-- 底部进度 -->
    <div class="progress-container">
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var wrapper = document.getElementById('loaderWrapper');
      var redirectUrl = 'src/pages/landing.html';
      var duration = 2800; // 动画展示时间

      // 动画播放完毕后执行退出动画并跳转
      setTimeout(function() {
        wrapper.classList.add('exit');
        
        // 等待退出动画完成后跳转
        setTimeout(function() {
          window.location.href = redirectUrl;
        }, 800);
      }, duration);
    })();
  </script>
</body>
</html>
