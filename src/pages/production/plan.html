<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>生产计划 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">生产计划</div>
          <div class="page-subtitle">制定与管理生产计划</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新建计划</button>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">计划列表</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>编号</th><th>计划名称</th><th>开始日期</th><th>结束日期</th><th>产品</th><th>状态</th><th>操作</th></tr>
            </thead>
            <tbody id="plan-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/utils/dom.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/utils/format.js"></script>
  <script src="../../assets/js/modules/auth.js"></script>
  <script src="../../assets/js/modules/navigation.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../data/production.js"></script>
  <script>
    'use strict';
    fetch('../../components/header.html').then(r => r.text()).then(html => {
      document.getElementById('header-placeholder').innerHTML = html;
      appNav.init();
    });
    fetch('../../components/sidebar.html').then(r => r.text()).then(html => {
      document.getElementById('sidebar-placeholder').innerHTML = html;
    });

    const statusMap = { '进行中': 'badge-success', '待启动': 'badge-warning', '已完成': 'badge-info' };
    const list = [...productionData.plans];

    function renderTable() {
      document.getElementById('plan-tbody').innerHTML = list.map(p => `
        <tr>
          <td>${p.id}</td>
          <td><strong>${p.name}</strong></td>
          <td>${p.startDate}</td>
          <td>${p.endDate}</td>
          <td>${p.products.join('、')}</td>
          <td><span class="badge ${statusMap[p.status] || 'badge-default'}">${p.status}</span></td>
          <td><button class="btn btn-danger btn-sm" onclick="deletePlan('${p.id}')">删除</button></td>
        </tr>
      `).join('');
    }

    function deletePlan(id) {
      if (!confirm('确认删除该计划？')) return;
      const idx = list.findIndex(p => p.id === id);
      if (idx > -1) { list.splice(idx, 1); renderTable(); }
    }

    document.getElementById('add-btn').onclick = () => alert('新建计划功能待实现');
    renderTable();
  </script>
</body>
</html>
