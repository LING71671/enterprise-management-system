<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>数据分析 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">数据分析</div>
          <div class="page-subtitle">采购数据分析报表</div>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="card-header"><div class="card-title">月度采购分析</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>月份</th><th>采购金额</th><th>订单数</th><th>占比</th></tr>
            </thead>
            <tbody id="analysis-tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="card" style="margin-top:var(--spacing-lg)">
        <div class="card-header"><div class="card-title">供应商采购占比</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>供应商</th><th>采购金额</th><th>占比</th></tr>
            </thead>
            <tbody id="supplier-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/utils/dom.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/utils/format.js"></script>
  <script src="../../assets/js/modules/auth.js"></script>
  <script src="../../assets/js/modules/navigation.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../data/purchase.js"></script>
  <script src="../../assets/js/system/purchase/analysis.js"></script>
</body>
</html>
