<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>采购流程 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">采购流程</div>
          <div class="page-subtitle">采购申请与审批</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新建采购单</button>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">采购订单列表</div>
          <div class="toolbar-right">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" placeholder="搜索供应商/物品">
            </div>
            <select class="form-control" id="status-filter" style="width:100px">
              <option value="">全部状态</option>
              <option value="待审核">待审核</option>
              <option value="待发货">待发货</option>
              <option value="运输中">运输中</option>
              <option value="已到货">已到货</option>
            </select>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>订单编号</th><th>供应商</th><th>采购物品</th><th>数量</th><th>单价</th><th>总金额</th><th>下单日期</th><th>交货日期</th><th>状态</th></tr>
            </thead>
            <tbody id="order-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/utils/dom.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/utils/format.js"></script>
  <script src="../../assets/js/modules/auth.js"></script>
  <script src="../../assets/js/modules/navigation.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../data/purchase.js"></script>
  <script src="../../assets/js/system/purchase/process.js"></script>
</body>
</html>
