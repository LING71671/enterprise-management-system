<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>采购管理 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">采购管理</div>
          <div class="page-subtitle">供应商与采购全流程管理</div>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="dashboard-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:var(--spacing-md);margin-top:var(--spacing-lg)">
        <a href="supplier.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon">🤝</div>
          <div class="stat-info"><div class="stat-value" style="font-size:var(--font-size-lg)">供应商信息</div><div class="stat-label">供应商档案与评级</div></div>
        </a>
        <a href="process.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon">📝</div>
          <div class="stat-info"><div class="stat-value" style="font-size:var(--font-size-lg)">采购流程</div><div class="stat-label">采购申请与审批</div></div>
        </a>
        <a href="tracking.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon">🚚</div>
          <div class="stat-info"><div class="stat-value" style="font-size:var(--font-size-lg)">订单跟踪</div><div class="stat-label">采购订单物流跟踪</div></div>
        </a>
        <a href="analysis.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon">📊</div>
          <div class="stat-info"><div class="stat-value" style="font-size:var(--font-size-lg)">数据分析</div><div class="stat-label">采购数据分析报表</div></div>
        </a>
      </div>

      <div class="card" style="margin-top:var(--spacing-lg)">
        <div class="card-header">
          <div class="card-title">近期采购订单</div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>订单编号</th><th>供应商</th><th>采购物品</th><th>金额</th><th>交货日期</th><th>状态</th></tr>
            </thead>
            <tbody id="order-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

<script src="../../assets/js/utils/dom.js"></script>
<script src="../../assets/js/utils/storage.js"></script>
<script src="../../assets/js/utils/format.js"></script>
<script src="../../assets/js/modules/auth.js"></script>
<script src="../../assets/js/modules/navigation.js"></script>
<script src="../../assets/js/modules/mobile-nav.js"></script>
<script src="../../assets/js/main.js"></script>
<script src="../../data/purchase.js"></script>
<script src="../../assets/js/system/purchase/index.js"></script>
</body>
</html>
