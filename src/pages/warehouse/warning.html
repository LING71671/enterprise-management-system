<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>库存预警 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">库存预警</div>
          <div class="page-subtitle">库存预警管理</div>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="card-header"><div class="card-title">库存预警列表</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>物料编号</th><th>物料名称</th><th>类别</th><th>规格</th><th>当前库存</th><th>安全库存</th><th>缺口</th><th>紧急程度</th></tr>
            </thead>
            <tbody id="warning-tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="card" style="margin-top:var(--spacing-lg)">
        <div class="card-header"><div class="card-title">库存正常列表</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>物料编号</th><th>物料名称</th><th>类别</th><th>当前库存</th><th>安全库存</th><th>库存充足度</th></tr>
            </thead>
            <tbody id="normal-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/utils/dom.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/utils/format.js"></script>
  <script src="../../assets/js/modules/auth.js"></script>
  <script src="../../assets/js/modules/navigation.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../data/warehouse.js"></script>
  <script src="../../assets/js/system/warehouse/warning.js"></script>
</body>
</html>
